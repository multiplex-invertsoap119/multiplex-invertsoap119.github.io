name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A4D4D3: ${{ secrets.A4D4D3 }}
          BC6156: ${{ secrets.BC6156 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A4D4D3', '')
          bm = os.environ.get('BC6156', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 74608ad4309c52eb3dc76424b502f7c0f7a731aee8ba -->', gm)
              s2 = s2.replace('<!-- b56f5bd5c91a6c0dda13af04c5ff863cb04a2c -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
